<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFlow - Feedback and Issues</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%231F3864'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-size='34' fill='white'%3ECF%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body id="feedbackPage">
  <nav class="navbar">
    <div class="container navbar-inner">
      <div class="brand">CampusFlow<small>Smart Campus Resource & Facility Manager</small></div>
      <button id="hamburgerBtn" class="hamburger">Menu</button>
      <div id="navLinks" class="nav-links"><a class="nav-link" href="../dashboard/student.html">Dashboard</a><a class="nav-link active" href="index.html">Feedback</a></div>
      <div class="navbar-right"><span id="roleBadge" class="role-badge">Role</span><button class="btn btn-danger" onclick="logout()">Logout</button></div>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title mb-4">Anonymous Feedback and Facility Issues</h1>
    <div class="grid-2">
      <section class="card">
        <p class="badge badge-free">No Login Required</p>
        <form id="feedbackForm" class="grid gap-3 mt-3">
          <div class="form-group"><label for="issueBlock">Block</label><select id="issueBlock"><option>CSIT Block</option><option>K.P. Nautiyal Block</option></select></div>
          <div class="form-group"><label for="issueFloor">Floor</label><select id="issueFloor"></select></div>
          <div class="form-group"><label for="issueRoom">Room</label><select id="issueRoom"></select></div>
          <div class="form-group"><label for="issueType">Issue Type</label><select id="issueType"><option>Broken AC</option><option>Electrical Issue</option><option>Washroom Problem</option><option>Furniture Damage</option><option>Internet Issue</option><option>Projector Not Working</option><option>Other</option></select></div>
          <div class="form-group"><label for="issueDescription">Description</label><textarea id="issueDescription" rows="4"></textarea></div>
          <div class="form-group"><label for="issuePhoto">Optional Photo</label><input id="issuePhoto" type="file" accept="image/*" /></div>
          <button class="btn btn-primary" type="submit">Submit Anonymously</button>
        </form>
      </section>

      <section>
        <div class="flex-between mb-3"><h2 class="card-title">Public Issue Board</h2><select id="issueStatusFilter" class="w-auto"><option>All</option><option>Pending</option><option>In Progress</option><option>Resolved</option></select></div>
        <div id="issueBoard" class="grid gap-3"></div>
      </section>
    </div>
  </main>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/feedback.js"></script>
</body>
</html>
