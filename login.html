<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFlow - Login</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%231F3864'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-size='34' fill='white'%3ECF%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1 class="auth-logo">CampusFlow</h1>
    <p class="auth-subtitle">Smart Campus Resource & Facility Manager</p>

    <form id="loginForm" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" />
        <small id="emailError" class="error-text"></small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" />
        <small id="passwordError" class="error-text"></small>
      </div>

      <div class="form-group">
        <label for="role">Select Role</label>
        <select id="role">
          <option value="">Choose a role</option>
          <option value="Student">Student</option>
          <option value="Faculty">Faculty</option>
          <option value="Admin">Admin</option>
        </select>
        <small id="roleError" class="error-text"></small>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
      <small id="globalError" class="error-text"></small>
    </form>

    <p class="auth-bottom">No account yet? <a href="register.html">Register here</a></p>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
